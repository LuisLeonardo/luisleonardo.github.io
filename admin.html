<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Panel de Administración - CPEE</title>
    <link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display&family=DM+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --cafe: #2B1B12;
            --naranja: #d35a34;
            --crema: #fff1da;
            --verde: #2a4939;
            --gris-claro: #f4f4f4;
            --borde: #e0e0e0;
        }
        body { font-family: 'DM Sans', sans-serif; background-color: var(--gris-claro); margin: 0; color: var(--cafe); }
        .admin-nav { background: var(--cafe); color: var(--crema); padding: 15px 30px; display: flex; justify-content: space-between; align-items: center; box-shadow: 0 4px 10px rgba(0,0,0,0.1); }
        .admin-nav h1 { font-family: 'DM Serif Display', serif; margin: 0; font-size: 1.5rem; }
        .btn-salir { background: transparent; border: 1px solid var(--crema); color: var(--crema); padding: 8px 15px; border-radius: 5px; cursor: pointer; transition: 0.3s; }
        .btn-salir:hover { background: var(--crema); color: var(--cafe); }
        .tabs { display: flex; background: white; border-bottom: 1px solid var(--borde); padding: 0 30px; }
        .tab-btn { background: none; border: none; padding: 20px 30px; font-family: 'DM Sans', sans-serif; font-size: 1.1rem; font-weight: 600; color: #888; cursor: pointer; border-bottom: 3px solid transparent; transition: 0.3s; }
        .tab-btn.active { color: var(--naranja); border-bottom-color: var(--naranja); }
        .container { padding: 30px; max-width: 1400px; margin: 0 auto; }
        .tab-content { display: none; background: white; border-radius: 8px; padding: 30px; box-shadow: 0 4px 15px rgba(0,0,0,0.05); }
        .tab-content.active { display: block; }
        table { width: 100%; border-collapse: collapse; margin-top: 20px; font-size: 0.85rem; }
        th, td { padding: 12px 10px; text-align: left; border-bottom: 1px solid var(--borde); }
        th { background-color: var(--crema); color: var(--cafe); font-weight: 700; text-transform: uppercase; font-size: 0.75rem; letter-spacing: 0.05em; }
        .badge { padding: 4px 8px; border-radius: 4px; font-size: 0.7rem; font-weight: bold; background: #eee; color: #555; }
        .badge.solicitado { background: #ffeeda; color: var(--naranja); border: 1px solid var(--naranja); }
        .checkbox-acceso { width: 18px; height: 18px; cursor: pointer; accent-color: var(--verde); }
        .btn-accion { background: var(--verde); color: white; border: none; padding: 8px 12px; border-radius: 4px; cursor: pointer; font-weight: 600; font-size: 0.8rem; transition: 0.3s; }
        #pantalla-bloqueo { position: fixed; inset: 0; background: var(--crema); display: flex; flex-direction: column; justify-content: center; align-items: center; z-index: 9999; }
    </style>
</head>
<body>

    <div id="pantalla-bloqueo">
        <h2 style="font-family: 'DM Serif Display'; color: var(--cafe); font-size: 2rem;">Verificando credenciales de Administrador...</h2>
    </div>

    <div class="admin-nav" id="admin-nav" style="display:none;">
        <h1>CPEE | Centro de Mando</h1>
        <button class="btn-salir" onclick="cerrarSesion()">Cerrar Sesión</button>
    </div>

    <div class="tabs" id="admin-tabs" style="display:none;">
        <button class="tab-btn active" onclick="switchTab('accesos')">Gestión de Accesos</button>
        <button class="tab-btn" onclick="switchTab('constancias')">Solicitudes de Constancia</button>
    </div>

    <div class="container" id="admin-content" style="display:none;">
        <div id="accesos" class="tab-content active">
            <h2>Alumnos Registrados</h2>
            <table id="tabla-accesos">
                <thead>
                    <tr>
                        <th>Correo del Alumno</th>
                        <th>Mate</th>
                        <th>C. Política</th>
                        <th>Crisis</th>
                        <th>P. Crítico</th>
                        <th>Investigación</th>
                        <th>Org. Com.</th>
                        <th>Cultura</th>
                    </tr>
                </thead>
                <tbody id="body-accesos"></tbody>
            </table>
        </div>

        <div id="constancias" class="tab-content">
            <h2>Solicitudes Pendientes</h2>
            <table id="tabla-constancias">
                <thead>
                    <tr>
                        <th>Nombre para Diploma</th>
                        <th>Correo</th>
                        <th>Curso</th>
                        <th>Fecha</th>
                        <th>Acción</th>
                    </tr>
                </thead>
                <tbody id="body-constancias"></tbody>
            </table>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.11.0/firebase-app.js";
        import { getAuth, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/10.11.0/firebase-auth.js";
        import { getFirestore, collection, getDocs, doc, updateDoc } from "https://www.gstatic.com/firebasejs/10.11.0/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyA5YZCAHcrMA36PmgpOxmHnTOI6zgZNMgg",
            authDomain: "cpee-plataforma-a655a.firebaseapp.com",
            projectId: "cpee-plataforma-a655a",
            storageBucket: "cpee-plataforma-a655a.firebasestorage.app",
            messagingSenderId: "684415102099",
            appId: "1:684415102099:web:3f2b649a34386677a87166"
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);

        const CORREO_ADMIN = "cpee.contact@gmail.com"; 

        // IDs corregidos para coincidir con lab.html
        const cursos = [
            { id: "matematicas", nombre: "Mate" },
            { id: "cp", nombre: "C. Política" },
            { id: "crisis", nombre: "Crisis" },
            { id: "pc", nombre: "P. Crítico" },
            { id: "inv", nombre: "Investigación" },
            { id: "oc", nombre: "Org. Com." },
            { id: "cultura", nombre: "Cultura" }
        ];

        const coleccionesConstancias = [
            "solicitudes_constancias", "solicitud_constancias_cursofp", "solicitud_constancias_cursoce",
            "solicitud_constancias_cursomate", "solicitud_constancias_cursocp", "solicitud_constancias_cursocrisis",
            "solicitud_constancias_cursopc", "solicitud_constancias_cursoinv", "solicitud_constancias_cursooc",
            "solicitud_constancias_cursocultura"
        ];

        onAuthStateChanged(auth, async (user) => {
            if (!user || user.email !== CORREO_ADMIN) { window.location.href = "login.html"; return; }
            document.getElementById('pantalla-bloqueo').style.display = "none";
            document.getElementById('admin-nav').style.display = "flex";
            document.getElementById('admin-tabs').style.display = "flex";
            document.getElementById('admin-content').style.display = "block";
            cargarAccesos();
            cargarConstancias();
        });

        async function cargarAccesos() {
            const body = document.getElementById('body-accesos');
            body.innerHTML = "";
            const querySnapshot = await getDocs(collection(db, "progreso_usuarios"));
            querySnapshot.forEach((docUsuario) => {
                const data = docUsuario.data();
                const uid = docUsuario.id;
                let tr = document.createElement('tr');
                tr.innerHTML = `<td>${data.correo || '---'}</td>`;
                cursos.forEach(curso => {
                    let td = document.createElement('td');
                    let solicitado = data[`solicitud_${curso.id}`] && !data[`acceso_${curso.id}`];
                    let checked = data[`acceso_${curso.id}`] ? "checked" : "";
                    td.innerHTML = `${solicitado ? '<span class="badge solicitado">S</span><br>' : ''}<input type="checkbox" class="checkbox-acceso" data-uid="${uid}" data-curso="${curso.id}" ${checked}>`;
                    tr.appendChild(td);
                });
                body.appendChild(tr);
            });
            document.querySelectorAll('.checkbox-acceso').forEach(checkbox => {
                checkbox.addEventListener('change', async (e) => {
                    const uid = e.target.getAttribute('data-uid');
                    const cursoId = e.target.getAttribute('data-curso');
                    await updateDoc(doc(db, "progreso_usuarios", uid), { [`acceso_${cursoId}`]: e.target.checked });
                });
            });
        }

        async function cargarConstancias() {
            const body = document.getElementById('body-constancias');
            body.innerHTML = "";
            for (const col of coleccionesConstancias) {
                const q = await getDocs(collection(db, col));
                q.forEach((docS) => {
                    const d = docS.data();
                    if (d.estado === "Pendiente") {
                        let tr = document.createElement('tr');
                        tr.innerHTML = `<td>${d.nombre_completo}</td><td>${d.correo}</td><td>${d.curso}</td><td>${d.fecha_solicitud?.toDate().toLocaleDateString() || '---'}</td><td><button class="btn-accion" onclick="marcarEnviada('${col}','${docS.id}', this)">✔️</button></td>`;
                        body.appendChild(tr);
                    }
                });
            }
        }

        window.marcarEnviada = async (col, id, btn) => {
            await updateDoc(doc(db, col, id), { estado: "Enviada" });
            btn.parentElement.parentElement.remove();
        }

        window.switchTab = (id) => {
            document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
            document.querySelectorAll('.tab-content').forEach(c => c.classList.remove('active'));
            document.getElementById(id).classList.add('active');
            event.target.classList.add('active');
        }

        window.cerrarSesion = () => signOut(auth).then(() => window.location.href = "login.html");
    </script>
</body>
</html>
